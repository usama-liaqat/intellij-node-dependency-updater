name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Publish to JetBrains Marketplace
    runs-on: ubuntu-latest
    # Pauses for manual approval if "Required reviewers" is enabled on the environment.
    # The PUBLISH_TOKEN secret is read from this environment's scope, not the repo scope.
    environment: marketplace
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Derive PLUGIN_VERSION from tag
        # Strip the leading "v" from the tag (e.g. "v0.1.0-beta.1" → "0.1.0-beta.1") and export it
        # so every subsequent gradle invocation in this job picks it up via providers.environmentVariable.
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "PLUGIN_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Building plugin version: $VERSION"

      - name: Run tests
        run: ./gradlew test --stacktrace

      - name: Verify plugin structure
        run: ./gradlew verifyPluginStructure --stacktrace

      # Patch BEFORE build so the plugin's <change-notes> embeds the version-specific section
      # (not the generic [Unreleased] block). Failing here also stops the workflow before publish.
      - name: Patch CHANGELOG (move Unreleased into the new tagged section)
        run: ./gradlew patchChangelog --stacktrace

      - name: Build plugin
        run: ./gradlew buildPlugin --stacktrace

      - name: Publish to JetBrains Marketplace
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: ./gradlew publishPlugin --stacktrace

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG="${GITHUB_REF#refs/tags/}"
          # Write notes to a file rather than passing them inline so backticks, $, and other
          # shell-special characters in the changelog can't break the gh invocation.
          ./gradlew getChangelog --console=plain -q --no-header > release-notes.md
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file release-notes.md \
            build/distributions/*.zip
